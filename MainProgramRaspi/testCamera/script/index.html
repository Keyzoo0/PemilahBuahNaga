<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PemilahBuahNaga — Dual Camera Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🐉</span>
                <h1>PemilahBuahNaga</h1>
            </div>
            <p class="subtitle">Dual Camera Real-Time Monitor</p>
            <div class="status-bar">
                <span class="dot dot-green"></span>
                <span id="status-text">Connecting...</span>
            </div>
        </header>

        <main>
            <div class="camera-grid">
                <div class="camera-card">
                    <div class="camera-header">
                        <span class="camera-badge cam1">CAM 1</span>
                        <span class="camera-info" id="info-cam1">--</span>
                    </div>
                    <div class="camera-view">
                        <img id="stream1" src="/video_feed_1" alt="Camera 1">
                        <div class="camera-overlay">
                            <span class="cam-label">Camera 1</span>
                        </div>
                    </div>
                </div>

                <div class="camera-card">
                    <div class="camera-header">
                        <span class="camera-badge cam2">CAM 2</span>
                        <span class="camera-info" id="info-cam2">--</span>
                    </div>
                    <div class="camera-view">
                        <img id="stream2" src="/video_feed_2" alt="Camera 2">
                        <div class="camera-overlay">
                            <span class="cam-label">Camera 2</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <span>PemilahBuahNaga © 2026 — Raspberry Pi 5</span>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
